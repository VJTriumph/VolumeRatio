<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Volume Ratio Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0e17;--bg2:#0f1520;--bg3:#141c2e;--bg4:#1a2338;--border:#1e2d45;--border2:#243350;--txt:#e2e8f0;--txt2:#94a3b8;--txt3:#64748b;--blue:#3b82f6;--cyan:#06b6d4;--green:#22c55e;--red:#ef4444;--yellow:#f59e0b;--purple:#a855f7;--orange:#f97316}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:'Segoe UI',system-ui,sans-serif;font-size:13px}
.hdr{background:linear-gradient(90deg,#0a0e17 0%,#0f1c35 50%,#0a0e17 100%);padding:14px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.hdr-left{display:flex;align-items:center;gap:10px}
.hdr-icon{width:28px;height:28px;background:linear-gradient(135deg,#1d4ed8,#06b6d4);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px}
.hdr h1{font-size:1.25rem;font-weight:700;background:linear-gradient(90deg,#60a5fa,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hdr-right{font-size:.75rem;color:var(--txt3);display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.hdr-right a{color:var(--blue);text-decoration:none}
.update-info{display:flex;flex-direction:column;align-items:flex-end;gap:2px}
.update-label{font-size:.65rem;color:var(--txt3);text-transform:uppercase;letter-spacing:.06em}
.update-date{font-size:.78rem;color:var(--txt2);font-weight:600}
.update-time{font-size:.7rem;color:var(--txt3)}
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:1px;background:var(--border);border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.card{background:var(--bg2);padding:16px 20px;text-align:center}
.card .lb{font-size:.68rem;color:var(--txt3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;font-weight:600}
.card .vl{font-size:2rem;font-weight:800;line-height:1}
.c-blue .vl{color:var(--blue)}.c-green .vl{color:var(--green)}.c-red .vl{color:var(--red)}.c-yellow .vl{color:var(--yellow)}.c-purple .vl{color:var(--purple)}
/* ── Data status banner ── */
.data-banner{display:none;align-items:center;gap:10px;padding:8px 20px;font-size:.78rem;font-weight:500;border-bottom:1px solid transparent}
.data-banner.show{display:flex}
.data-banner .ban-icon{font-size:1rem;flex-shrink:0}
.data-banner .ban-msg{flex:1}
.data-banner .ban-close{cursor:pointer;opacity:.6;padding:2px 6px;font-size:.85rem}
.data-banner .ban-close:hover{opacity:1}
.ban-warn{background:#1c1400;border-color:#92400e;color:#fbbf24}
.ban-err{background:#1a0505;border-color:#7f1d1d;color:#f87171}
.ban-ok{background:#031a0e;border-color:#065f46;color:#6ee7b7}
.ban-info{background:#0c1829;border-color:#1e3a5f;color:#93c5fd}
/* ── Controls ── */
.ctl{background:var(--bg2);padding:10px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.srch-wrap{position:relative;display:flex;align-items:center}
.srch-wrap svg{position:absolute;left:9px;color:var(--txt3);width:14px;height:14px}
.srch-wrap input{background:var(--bg3);border:1px solid var(--border2);border-radius:5px;color:var(--txt);padding:7px 10px 7px 30px;font-size:.8rem;width:200px;outline:none}
.srch-wrap input:focus{border-color:var(--blue)}
.ctl select{background:var(--bg3);border:1px solid var(--border2);border-radius:5px;color:var(--txt);padding:7px 10px;font-size:.8rem;cursor:pointer;outline:none;min-width:120px}
.ctl select:focus{border-color:var(--blue)}
.ctl select#sectorFilt{min-width:200px}
.btn-reset{padding:7px 14px;background:var(--bg3);border:1px solid var(--border2);border-radius:5px;color:var(--txt2);font-size:.8rem;cursor:pointer}
.btn-reset:hover{background:var(--bg4);color:var(--txt)}
.btn-refresh{padding:7px 14px;background:#166534;border:1px solid #16a34a;border-radius:5px;color:#4ade80;font-size:.8rem;font-weight:600;cursor:pointer}
.btn-refresh:hover{background:#14532d}
.ctl-right{margin-left:auto;font-size:.78rem;color:var(--txt3)}
.ctl-right b{color:var(--txt2)}
.tbl-outer{overflow-x:auto;flex:1}
table{width:100%;border-collapse:collapse;min-width:900px}
thead tr{background:var(--bg2);border-bottom:2px solid var(--border2)}
thead th{padding:10px 12px;text-align:left;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--txt3);white-space:nowrap;cursor:pointer;user-select:none;border-right:1px solid var(--border)}
thead th:last-child{border-right:none}
thead th:hover{color:var(--txt2)}
thead th .sa{font-size:.6rem;margin-left:3px;opacity:.5}
thead th.sort-asc .sa::after{content:'\2191';opacity:1;color:var(--blue)}
thead th.sort-desc .sa::after{content:'\2193';opacity:1;color:var(--blue)}
thead th:not(.sort-asc):not(.sort-desc) .sa::after{content:'\2195';font-size:.55rem}
th.r,td.r{text-align:right}
th.c,td.c{text-align:center}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
tbody tr:hover{background:var(--bg3)}
tbody td{padding:9px 12px;border-right:1px solid var(--border);white-space:nowrap}
tbody td:last-child{border-right:none}
.td-rank{color:var(--txt3);font-size:.75rem;font-weight:600;min-width:48px}
.td-rank.top{color:var(--yellow);font-weight:800}
.td-sym{color:var(--blue);font-weight:700;font-size:.85rem;text-decoration:none;display:block;line-height:1.2}
.td-sym:hover{text-decoration:underline}
.td-co{color:var(--txt3);font-size:.7rem;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px}
.sect-pill{display:inline-block;padding:3px 9px;border-radius:4px;font-size:.7rem;font-weight:600;background:var(--bg4);color:var(--txt2);border:1px solid var(--border2);white-space:nowrap}
.pct-badge{display:inline-block;padding:3px 8px;border-radius:4px;font-size:.78rem;font-weight:700;min-width:60px;text-align:center}
.pct-pos{background:#052e16;color:#4ade80;border:1px solid #166534}
.pct-neg{background:#450a0a;color:#f87171;border:1px solid #991b1b}
.pct-neu{background:var(--bg4);color:var(--txt2);border:1px solid var(--border2)}
.td-vol{font-size:.82rem;color:var(--txt)}
.td-vol .sub{display:block;font-size:.68rem;color:var(--txt3);margin-top:1px}
.vr-wrap{display:flex;align-items:center;gap:8px}
.vr-bar-bg{width:60px;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;flex-shrink:0}
.vr-bar{height:100%;border-radius:3px;transition:width .3s}
.vr-lo .vr-bar{background:#22c55e}.vr-md .vr-bar{background:#f59e0b}.vr-hi .vr-bar{background:#ef4444}
.vr-val{font-size:.82rem;font-weight:700;min-width:38px;text-align:right}
.vr-lo .vr-val{color:#22c55e}.vr-md .vr-val{color:#f59e0b}.vr-hi .vr-val{color:#ef4444}
.pag{display:flex;justify-content:center;align-items:center;gap:6px;padding:14px;background:var(--bg2);border-top:1px solid var(--border)}
.pag button{padding:5px 11px;border-radius:4px;border:1px solid var(--border2);background:var(--bg3);color:var(--txt2);font-size:.78rem;cursor:pointer}
.pag button:disabled{opacity:.3;cursor:default}
.pag button.cur{background:var(--blue);border-color:var(--blue);color:#fff;font-weight:700}
.pag button:not(:disabled):not(.cur):hover{background:var(--bg4);color:var(--txt)}
.pag .pi{color:var(--txt3);font-size:.75rem;padding:0 4px}
.msg{text-align:center;padding:60px 20px;color:var(--txt2)}
.msg.err{color:var(--red)}
.spin{display:inline-block;width:20px;height:20px;border:2px solid var(--border2);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-left">
    <div class="hdr-icon">&#9654;</div>
    <h1>Volume Ratio Dashboard</h1>
  </div>
  <div class="hdr-right">
    <span>Source: <a href="https://github.com/VJTriumph/VolumeRatio" target="_blank">VJTriumph/VolumeRatio</a></span>
    <div class="update-info">
      <span class="update-label">EOD Auto-Updated</span>
      <span class="update-date" id="lastDate">&#8212;</span>
      <span class="update-time" id="lastTime">&#8212;</span>
    </div>
  </div>
</div>
<!-- Data status banner: shown only when there is a warning or error -->
<div class="data-banner" id="dataBanner">
  <span class="ban-icon" id="banIcon"></span>
  <span class="ban-msg" id="banMsg"></span>
  <span class="ban-close" onclick="document.getElementById('dataBanner').classList.remove('show')" title="Dismiss">&#10005;</span>
</div>
<div class="stats">
  <div class="card c-blue"><div class="lb">Total Stocks</div><div class="vl" id="cTotal">&#8212;</div></div>
  <div class="card c-green"><div class="lb">Gainers</div><div class="vl" id="cGain">&#8212;</div></div>
  <div class="card c-red"><div class="lb">Losers</div><div class="vl" id="cLoss">&#8212;</div></div>
  <div class="card c-yellow"><div class="lb">Avg Vol Ratio</div><div class="vl" id="cAvg">&#8212;</div></div>
  <div class="card c-purple"><div class="lb">Extreme (&gt;5x)</div><div class="vl" id="cExt">&#8212;</div></div>
</div>
<div class="ctl">
  <div class="srch-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input id="srch" placeholder="Search symbol or company..." oninput="applyFilters()"/>
  </div>
  <select id="sectorFilt" onchange="setSector(this.value)">
    <option value="All">All Sectors</option>
  </select>
  <select id="ratioFilt" onchange="applyFilters()">
    <option value="0">All Ratios</option>
    <option value="2">&gt; 2x</option>
    <option value="3">&gt; 3x</option>
    <option value="5">&gt; 5x</option>
    <option value="10">&gt; 10x</option>
  </select>
  <select id="chgFilt" onchange="applyFilters()">
    <option value="all">All % Change</option>
    <option value="pos">Positive only</option>
    <option value="neg">Negative only</option>
  </select>
  <select id="ppFilt" onchange="applyFilters()">
    <option value="25">25/page</option>
    <option value="50">50/page</option>
    <option value="100">100/page</option>
  </select>
  <button class="btn-reset" onclick="resetFilters()">&#8635; Reset</button>
  <button class="btn-refresh" onclick="loadData()">&#8635; Refresh</button>
  <div class="ctl-right"><b id="resInfo">&#8212;</b></div>
</div>
<div class="tbl-outer">
  <div class="msg" id="msgDiv"><span class="spin"></span>Loading data...</div>
  <table id="tbl" style="display:none">
    <thead>
      <tr>
        <th onclick="sortBy('Rank')" data-col="Rank">Rank<span class="sa"></span></th>
        <th onclick="sortBy('Symbol')" data-col="Symbol">Symbol<span class="sa"></span></th>
        <th onclick="sortBy('Sector')" data-col="Sector">Sector<span class="sa"></span></th>
        <th onclick="sortBy('Close')" data-col="Close" class="r">EOD Close<span class="sa"></span></th>
        <th onclick="sortBy('Pct Change')" data-col="Pct Change" class="c">% Chg<span class="sa"></span></th>
        <th onclick="sortBy('Today Volume')" data-col="Today Volume" class="r">Today Vol<span class="sa"></span></th>
        <th onclick="sortBy('15D Avg Volume')" data-col="15D Avg Volume" class="r">15D Avg<span class="sa"></span></th>
        <th onclick="sortBy('Volume Ratio')" data-col="Volume Ratio" class="r">Vol Ratio<span class="sa"></span></th>
        <th onclick="sortBy('Date')" data-col="Date" class="r">Date<span class="sa"></span></th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>
<div class="pag" id="pagDiv" style="display:none"></div>
<script>
const JSON_URL='https://raw.githubusercontent.com/VJTriumph/VolumeRatio/main/output/latest.json';
const CSV_URL='https://raw.githubusercontent.com/VJTriumph/VolumeRatio/main/output/volume_ratio_latest.csv';
let allData=[],filtData=[],curPage=1,sortCol='Volume Ratio',sortDir=-1,curSector='All';
const perPage=()=>+(document.getElementById('ppFilt').value||25);

/* ── Banner helpers ── */
function showBanner(type,icon,msg){
  const b=document.getElementById('dataBanner');
  const i=document.getElementById('banIcon');
  const m=document.getElementById('banMsg');
  b.className='data-banner show ban-'+type;
  i.textContent=icon;
  m.innerHTML=msg;
}
function hideBanner(){
  document.getElementById('dataBanner').classList.remove('show');
}

/* ── Data quality checks ── */
function checkDataQuality(data,source){
  if(!data||data.length===0){
    showBanner('err','\u26A0','No data loaded. The data file may be empty or missing. <a href="https://github.com/VJTriumph/VolumeRatio/actions" target="_blank" style="color:inherit;text-decoration:underline">Check GitHub Actions</a> to see if the last run succeeded.');
    return;
  }

  // Check data date freshness
  const dates=data.map(d=>d['Date']).filter(Boolean);
  if(dates.length){
    const latest=dates.sort().pop();
    const latestMs=new Date(latest).getTime();
    const nowMs=Date.now();
    const diffDays=Math.floor((nowMs-latestMs)/(1000*60*60*24));
    if(diffDays>=3){
      showBanner('err','\u26A0','Data is <b>'+diffDays+' days old</b> (last update: '+latest+'). The automated job may have failed. <a href="https://github.com/VJTriumph/VolumeRatio/actions" target="_blank" style="color:inherit;text-decoration:underline">Check GitHub Actions &#8599;</a>');
      return;
    }
    if(diffDays===2){
      showBanner('warn','\u26A0','Data is <b>2 days old</b> (last update: '+latest+'). Expected EOD update may be delayed.');
      return;
    }
    if(diffDays===1){
      showBanner('warn','\u26A0','Data is from <b>yesterday</b> ('+latest+'). Today\u2019s EOD update has not arrived yet.');
      return;
    }
  }

  // Check for missing critical fields
  const missingClose=data.filter(d=>!d['Close']||+d['Close']===0).length;
  const missingVol=data.filter(d=>!d['Today Volume']||+d['Today Volume']===0).length;
  const missingVR=data.filter(d=>!d['Volume Ratio']||+d['Volume Ratio']===0).length;
  if(missingVR>data.length*0.1){
    showBanner('warn','\u26A0','<b>'+missingVR+' stocks</b> ('+Math.round(missingVR/data.length*100)+'%) have missing Volume Ratio values. Data may be incomplete.');
    return;
  }
  if(missingClose>data.length*0.1){
    showBanner('warn','\u26A0','<b>'+missingClose+' stocks</b> ('+Math.round(missingClose/data.length*100)+'%) have missing Close price. Data may be incomplete.');
    return;
  }

  // Source fallback notice
  if(source==='csv'){
    showBanner('info','\u2139','Loaded from CSV fallback (JSON unavailable). Some fields may be limited.');
    return;
  }

  hideBanner();
}

function fmtVol(n){
  n=+n;if(isNaN(n))return'&#8212;';
  if(n>=1e7)return(n/1e7).toFixed(2)+'Cr';
  if(n>=1e5)return(n/1e5).toFixed(2)+'L';
  if(n>=1e3)return(n/1e3).toFixed(1)+'K';
  return n.toLocaleString();
}
function fmtVolSub(n){n=+n;if(isNaN(n))return'';return n.toLocaleString('en-IN');}
function parseCSV(txt){
  const lines=txt.trim().split('\n');
  const hdrs=lines[0].split(',').map(h=>h.trim());
  return lines.slice(1).filter(l=>l.trim()).map(l=>{
    const vals=[];let cur='',inQ=false;
    for(let c of l){if(c==='"'){inQ=!inQ;}else if(c===','&&!inQ){vals.push(cur.trim());cur='';}else cur+=c;}
    vals.push(cur.trim());
    const obj={};hdrs.forEach((h,i)=>obj[h]=vals[i]||'');
    return obj;
  });
}

async function loadData(){
  document.getElementById('msgDiv').className='msg';
  document.getElementById('msgDiv').innerHTML='<span class="spin"></span>Loading data...';
  document.getElementById('msgDiv').style.display='';
  document.getElementById('tbl').style.display='none';
  document.getElementById('pagDiv').style.display='none';
  hideBanner();
  try{
    const jr=await fetch(JSON_URL+'?t='+Date.now());
    if(!jr.ok)throw new Error('HTTP '+jr.status);
    const jdata=await jr.json();
    allData=jdata.data||[];
    if(jdata.last_updated){
      const parts=jdata.last_updated.split(' ');
      document.getElementById('lastDate').textContent=parts[0]||'&#8212;';
      document.getElementById('lastTime').textContent=(parts[1]||'')+' IST';
    }
    buildStats(allData);
    buildSectorSelect(allData);
    curPage=1;applyFilters();
    document.getElementById('msgDiv').style.display='none';
    document.getElementById('tbl').style.display='';
    document.getElementById('pagDiv').style.display='';
    checkDataQuality(allData,'json');
  }catch(jsonErr){
    try{
      const r=await fetch(CSV_URL+'?t='+Date.now());
      if(!r.ok)throw new Error('HTTP '+r.status);
      const txt=await r.text();
      allData=parseCSV(txt);
      const dates=allData.map(d=>d['Date']).filter(Boolean).sort();
      if(dates.length){
        document.getElementById('lastDate').textContent=dates[dates.length-1];
        document.getElementById('lastTime').textContent='EOD';
      }
      buildStats(allData);
      buildSectorSelect(allData);
      curPage=1;applyFilters();
      document.getElementById('msgDiv').style.display='none';
      document.getElementById('tbl').style.display='';
      document.getElementById('pagDiv').style.display='';
      checkDataQuality(allData,'csv');
    }catch(e){
      document.getElementById('msgDiv').className='msg err';
      document.getElementById('msgDiv').innerHTML=
        '<div style="font-size:2rem;margin-bottom:12px">&#9888;</div>'
        +'<div style="font-size:1rem;font-weight:700;margin-bottom:8px;color:var(--red)">Data Load Failed</div>'
        +'<div style="font-size:.82rem;color:var(--txt2);margin-bottom:16px">Could not fetch data from GitHub.<br>Error: <code style="color:var(--red)">'+e.message+'</code></div>'
        +'<div style="font-size:.78rem;color:var(--txt3);margin-bottom:20px">'
        +'Possible causes: no internet connection, GitHub is down, or the data files are missing.<br>'
        +'<a href="https://github.com/VJTriumph/VolumeRatio/actions" target="_blank" style="color:var(--blue)">Check GitHub Actions &#8599;</a> &nbsp;|&nbsp; '
        +'<a href="https://github.com/VJTriumph/VolumeRatio/tree/main/output" target="_blank" style="color:var(--blue)">Check output files &#8599;</a>'
        +'</div>'
        +'<button class="btn-refresh" onclick="loadData()" style="font-size:.85rem;padding:9px 20px">&#8635; Retry</button>';
    }
  }
}

function buildStats(data){
  const gain=data.filter(d=>+d['Pct Change']>0).length;
  const loss=data.filter(d=>+d['Pct Change']<0).length;
  const avg=data.length?(data.reduce((s,d)=>s+(+d['Volume Ratio']||0),0)/data.length).toFixed(2):'0';
  const ext=data.filter(d=>+d['Volume Ratio']>=5).length;
  document.getElementById('cTotal').textContent=data.length;
  document.getElementById('cGain').textContent=gain;
  document.getElementById('cLoss').textContent=loss;
  document.getElementById('cAvg').textContent=avg+'x';
  document.getElementById('cExt').textContent=ext;
}
function buildSectorSelect(data){
  const cnt={};
  data.forEach(d=>{const s=(d['Sector']||'Other').trim();cnt[s]=(cnt[s]||0)+1;});
  const sorted=Object.entries(cnt).sort((a,b)=>b[1]-a[1]);
  const sel=document.getElementById('sectorFilt');
  sel.innerHTML='<option value="All">All Sectors ('+data.length+')</option>';
  sorted.forEach(([s,c])=>{
    const opt=document.createElement('option');
    opt.value=s;
    opt.textContent=s+' ('+c+')';
    if(s===curSector)opt.selected=true;
    sel.appendChild(opt);
  });
}
function setSector(s){
  curSector=s;
  curPage=1;
  applyFilters();
}
function applyFilters(){
  const srch=(document.getElementById('srch').value||'').toLowerCase();
  const minVR=+(document.getElementById('ratioFilt').value||0);
  const chgF=document.getElementById('chgFilt').value;
  filtData=allData.filter(d=>{
    if(curSector!=='All'&&(d['Sector']||'Other').trim()!==curSector)return false;
    if(srch&&!(d['Symbol']||'').toLowerCase().includes(srch)&&!(d['Company Name']||'').toLowerCase().includes(srch))return false;
    if(minVR&&(+d['Volume Ratio']||0)<minVR)return false;
    if(chgF==='pos'&&(+d['Pct Change']||0)<=0)return false;
    if(chgF==='neg'&&(+d['Pct Change']||0)>=0)return false;
    return true;
  });
  filtData.sort((a,b)=>{
    let av=a[sortCol],bv=b[sortCol];
    if(!isNaN(+av)&&!isNaN(+bv)){av=+av;bv=+bv;}
    if(av<bv)return sortDir;if(av>bv)return -sortDir;return 0;
  });
  document.getElementById('resInfo').textContent=filtData.length+' stocks';
  renderPage();
}
function sortBy(col){
  if(sortCol===col)sortDir*=-1;else{sortCol=col;sortDir=-1;}
  document.querySelectorAll('thead th').forEach(th=>{
    th.classList.remove('sort-asc','sort-desc');
    if(th.dataset.col===col)th.classList.add(sortDir===1?'sort-asc':'sort-desc');
  });
  curPage=1;applyFilters();
}
function renderPage(){
  const pp=perPage();
  const start=(curPage-1)*pp,end=Math.min(start+pp,filtData.length);
  const slice=filtData.slice(start,end);
  const tbody=document.getElementById('tbody');
  const maxVR=Math.max(...filtData.map(d=>+d['Volume Ratio']||0),1);
  tbody.innerHTML=slice.map(d=>{
    const sym=(d['Symbol']||'').replace('.NS','').replace('.BO','');
    const rank=d['Rank']||'';
    const isTop=+d['Volume Ratio']>=5;
    const link='https://finance.yahoo.com/quote/'+encodeURIComponent(d['Symbol']||'');
    const pct=+d['Pct Change']||0;
    const pctCls=pct>0?'pct-pos':pct<0?'pct-neg':'pct-neu';
    const pctStr=(pct>0?'+':'')+pct.toFixed(2)+'%';
    const vr=+d['Volume Ratio']||0;
    const vrCls=vr>=5?'vr-hi':vr>=2?'vr-md':'vr-lo';
    const barW=Math.min(100,Math.round((vr/Math.max(maxVR,1))*100));
    const close=+(d['Close'])||0;
    const closeStr=close>0?'&#8377;'+close.toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2}):'&#8212;';
    const tv=+d['Today Volume']||0;
    const av=+d['15D Avg Volume']||0;
    return '<tr>'
      +'<td class="td-rank'+(isTop?' top':'')+'"><span style="color:'+(isTop?'var(--yellow)':'var(--txt3)')+';">#'+rank+'</span></td>'
      +'<td><a class="td-sym" href="'+link+'" target="_blank">'+sym+'</a><div class="td-co">'+(d['Company Name']||sym)+'</div></td>'
      +'<td><span class="sect-pill">'+((d['Sector']||'Other').trim())+'</span></td>'
      +'<td class="r" style="font-size:.85rem;font-weight:600;color:var(--txt)">'+closeStr+'</td>'
      +'<td class="c"><span class="pct-badge '+pctCls+'">'+pctStr+'</span></td>'
      +'<td class="td-vol r">'+fmtVol(tv)+'<span class="sub">'+fmtVolSub(tv)+'</span></td>'
      +'<td class="td-vol r">'+fmtVol(av)+'<span class="sub">'+fmtVolSub(av)+'</span></td>'
      +'<td class="r"><div class="vr-wrap '+vrCls+'" style="justify-content:flex-end"><div class="vr-bar-bg"><div class="vr-bar" style="width:'+barW+'%"></div></div><span class="vr-val">'+vr.toFixed(2)+'x</span></div></td>'
      +'<td class="r" style="color:var(--txt3);font-size:.75rem">'+(d['Date']||'&#8212;')+'</td>'
      +'</tr>';
  }).join('');
  renderPag();
}
function renderPag(){
  const pp=perPage();
  const total=Math.ceil(filtData.length/pp);
  const pag=document.getElementById('pagDiv');
  if(total<=1){pag.innerHTML='';return;}
  let h='<button onclick="goP('+Math.max(1,curPage-1)+')" '+(curPage===1?'disabled':'')+'>&larr;</button>';
  const s=Math.max(1,curPage-3),e=Math.min(total,curPage+3);
  if(s>1)h+='<button onclick="goP(1)">1</button>'+(s>2?'<span class="pi">&hellip;</span>':'');
  for(let p=s;p<=e;p++)h+='<button class="'+(p===curPage?'cur':'')+'" onclick="goP('+p+')">'+p+'</button>';
  if(e<total)h+=(e<total-1?'<span class="pi">&hellip;</span>':'')+'<button onclick="goP('+total+')">'+total+'</button>';
  h+='<button onclick="goP('+Math.min(total,curPage+1)+')" '+(curPage===total?'disabled':'')+'>&rarr;</button>';
  h+='<span class="pi">Page '+curPage+' / '+total+'</span>';
  pag.innerHTML=h;
}
function goP(p){curPage=p;renderPage();}
function resetFilters(){
  document.getElementById('srch').value='';
  document.getElementById('ratioFilt').value='0';
  document.getElementById('chgFilt').value='all';
  document.getElementById('sectorFilt').value='All';
  curSector='All';curPage=1;
  applyFilters();
}
loadData();
</script>
</body>
</html>
