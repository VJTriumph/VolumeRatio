<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Volume Ratio Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:#0d1117;color:#e6edf3;min-height:100vh}
.hdr{background:linear-gradient(135deg,#161b22,#1f2937);padding:16px 24px;border-bottom:1px solid #30363d}
.hdr h1{font-size:1.35rem;font-weight:700;color:#58a6ff}
.hdr .mt{font-size:.8rem;color:#8b949e}.hdr .mt b{color:#c9d1d9}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;padding:16px 24px}
.card{background:#161b22;border:1px solid #30363d;border-radius:9px;padding:13px;text-align:center}
.card .lb{font-size:.68rem;color:#8b949e;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.card .vl{font-size:1.5rem;font-weight:700}
.b .vl{color:#58a6ff}.g .vl{color:#3fb950}.r .vl{color:#f85149}.y .vl{color:#d29922}.p .vl{color:#bc8cff}
/* SECTOR TABS */
.sector-wrap{padding:0 24px;background:#0d1117;border-bottom:1px solid #21262d}
.sector-tabs{display:flex;gap:6px;padding:10px 0;overflow-x:auto;scrollbar-width:thin;scrollbar-color:#30363d transparent;white-space:nowrap}
.sector-tabs::-webkit-scrollbar{height:4px}.sector-tabs::-webkit-scrollbar-thumb{background:#30363d;border-radius:4px}
.s-tab{padding:5px 13px;border-radius:20px;border:1px solid #30363d;background:#161b22;color:#8b949e;font-size:.78rem;cursor:pointer;white-space:nowrap;transition:all .15s}
.s-tab:hover{border-color:#58a6ff;color:#58a6ff}
.s-tab.active{background:#1f6feb;border-color:#1f6feb;color:#fff;font-weight:600}
/* CONTROLS */
.ctl{padding:12px 24px;background:#0d1117;display:flex;flex-wrap:wrap;gap:10px;align-items:center;border-bottom:1px solid #21262d}
.ctl input,.ctl select{background:#161b22;border:1px solid #30363d;border-radius:6px;color:#e6edf3;padding:7px 11px;font-size:.82rem;outline:none}
.ctl input:focus,.ctl select:focus{border-color:#58a6ff}
.ctl input{width:220px}
.ctl select{cursor:pointer}
.btn{padding:7px 14px;border-radius:6px;border:1px solid #30363d;background:#21262d;color:#e6edf3;font-size:.82rem;cursor:pointer;transition:all .15s}
.btn:hover{background:#30363d;border-color:#58a6ff}
.res-info{font-size:.78rem;color:#8b949e;margin-left:auto}
/* TABLE */
.tbl-wrap{padding:0 24px 24px;overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.82rem;margin-top:12px}
thead th{background:#161b22;color:#8b949e;text-transform:uppercase;font-size:.72rem;letter-spacing:.05em;padding:10px 12px;border-bottom:2px solid #30363d;white-space:nowrap;cursor:pointer;user-select:none;position:sticky;top:0}
thead th:hover{color:#58a6ff}
thead th .arr{opacity:.4;font-size:.7rem;margin-left:3px}
thead th.sort-asc .arr::after{content:'\25B2'}
thead th.sort-desc .arr::after{content:'\25BC'}
thead th:not(.sort-asc):not(.sort-desc) .arr::after{content:'\25B2\25BC';font-size:.55rem}
tbody tr{border-bottom:1px solid #21262d;transition:background .1s}
tbody tr:hover{background:#161b22}
tbody td{padding:9px 12px;white-space:nowrap}
td.rank{color:#8b949e;font-size:.75rem;width:40px}
td.sym a{color:#58a6ff;text-decoration:none;font-weight:600}
td.sym a:hover{text-decoration:underline}
td.cname{color:#c9d1d9;max-width:180px;overflow:hidden;text-overflow:ellipsis}
td.sect{font-size:.75rem;padding:3px 8px;border-radius:12px;background:#1f2937;color:#79c0ff;white-space:nowrap}
td.pos{color:#3fb950}td.neg{color:#f85149}td.neu{color:#8b949e}
td.vr{font-weight:700}
.vr-hi{color:#f85149}.vr-md{color:#d29922}.vr-lo{color:#3fb950}
/* PAGINATION */
.pag{display:flex;justify-content:center;align-items:center;gap:8px;padding:14px 24px;font-size:.82rem}
.pag button{padding:5px 11px;border-radius:5px;border:1px solid #30363d;background:#161b22;color:#e6edf3;cursor:pointer}
.pag button:disabled{opacity:.35;cursor:default}
.pag button.cur{background:#1f6feb;border-color:#1f6feb;font-weight:700}
.pag .pi{color:#8b949e}
/* loading */
.loading{text-align:center;padding:60px;color:#58a6ff;font-size:1rem}
.err{text-align:center;padding:40px;color:#f85149}
footer{text-align:center;padding:12px;font-size:.75rem;color:#484f58;border-top:1px solid #21262d}
</style>
</head>
<body>
<div class="hdr">
  <h1>&#9654; Volume Ratio Dashboard</h1>
  <div class="mt">NSE Stocks &mdash; <b id="lastUp">Loading...</b></div>
</div>

<div class="stats" id="statsRow">
  <div class="card b"><div class="lb">Total Stocks</div><div class="vl" id="cTotal">—</div></div>
  <div class="card g"><div class="lb">Gainers</div><div class="vl" id="cGain">—</div></div>
  <div class="card r"><div class="lb">Losers</div><div class="vl" id="cLoss">—</div></div>
  <div class="card y"><div class="lb">Avg Vol Ratio</div><div class="vl" id="cAvg">—</div></div>
  <div class="card p"><div class="lb">Sectors</div><div class="vl" id="cSect">—</div></div>
</div>

<div class="sector-wrap">
  <div class="sector-tabs" id="sectorTabs"></div>
</div>

<div class="ctl">
  <input id="srch" placeholder="&#128269; Search symbol or company..." oninput="applyFilters()"/>
  <select id="ratioFilt" onchange="applyFilters()">
    <option value="0">All Vol Ratio</option>
    <option value="2">&gt; 2x</option>
    <option value="5">&gt; 5x</option>
    <option value="10">&gt; 10x</option>
  </select>
  <select id="chgFilt" onchange="applyFilters()">
    <option value="all">All % Change</option>
    <option value="pos">Positive only</option>
    <option value="neg">Negative only</option>
  </select>
  <button class="btn" onclick="resetFilters()">&#8635; Reset</button>
  <button class="btn" onclick="loadData()">&#8635; Refresh</button>
  <span class="res-info" id="resInfo"></span>
</div>

<div class="tbl-wrap">
  <div class="loading" id="msg">Loading data...</div>
  <table id="tbl" style="display:none">
    <thead>
      <tr>
        <th onclick="sortBy('Rank')" data-col="Rank">Rank<span class="arr"></span></th>
        <th onclick="sortBy('Symbol')" data-col="Symbol">Symbol<span class="arr"></span></th>
        <th onclick="sortBy('Company Name')" data-col="Company Name">Company<span class="arr"></span></th>
        <th onclick="sortBy('Sector')" data-col="Sector">Sector<span class="arr"></span></th>
        <th onclick="sortBy('Pct Change')" data-col="Pct Change">% Chg<span class="arr"></span></th>
        <th onclick="sortBy('Volume Ratio')" data-col="Volume Ratio">Vol Ratio<span class="arr"></span></th>
        <th onclick="sortBy('Today Volume')" data-col="Today Volume">Today Vol<span class="arr"></span></th>
        <th onclick="sortBy('15D Avg Volume')" data-col="15D Avg Volume">15D Avg Vol<span class="arr"></span></th>
        <th onclick="sortBy('Date')" data-col="Date">Date<span class="arr"></span></th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>
<div class="pag" id="pagDiv" style="display:none"></div>
<footer id="foot"></footer>

<script>
const CSV_URL = 'https://raw.githubusercontent.com/VJTriumph/VolumeRatio/main/output/volume_ratio_latest.csv';
let allData=[], filtData=[], curPage=1, perPage=50, sortCol='Volume Ratio', sortDir=-1, curSector='All';

function fmt(n){if(n==null)return'—';n=+n;if(n>=1e7)return(n/1e7).toFixed(2)+'Cr';if(n>=1e5)return(n/1e5).toFixed(2)+'L';return n.toLocaleString();}
function fmtVR(v){v=+v;if(v>=10)return'<span class="vr-hi">'+v.toFixed(2)+'x</span>';if(v>=3)return'<span class="vr-md">'+v.toFixed(2)+'x</span>';return'<span class="vr-lo">'+v.toFixed(2)+'x</span>';}
function fmtPct(p){p=+p;let cls=p>0?'pos':p<0?'neg':'neu';return'<span class="'+cls+'">'+(p>0?'+':'')+p.toFixed(2)+'%</span>';}

function parseCSV(txt){
  const lines=txt.trim().split('\n');
  const hdrs=lines[0].split(',').map(h=>h.trim());
  return lines.slice(1).map(l=>{
    const vals=l.split(',');
    const obj={};
    hdrs.forEach((h,i)=>obj[h]=(vals[i]||'').trim());
    return obj;
  });
}

async function loadData(){
  document.getElementById('msg').style.display='';
  document.getElementById('msg').textContent='Loading data...';
  document.getElementById('tbl').style.display='none';
  document.getElementById('pagDiv').style.display='none';
  try{
    const r=await fetch(CSV_URL+'?t='+Date.now());
    if(!r.ok)throw new Error('HTTP '+r.status);
    const txt=await r.text();
    allData=parseCSV(txt);
    buildStats(allData);
    buildSectorTabs(allData);
    applyFilters();
    document.getElementById('msg').style.display='none';
    document.getElementById('tbl').style.display='';
    document.getElementById('pagDiv').style.display='';
  }catch(e){
    document.getElementById('msg').className='err';
    document.getElementById('msg').textContent='Error loading data: '+e.message;
  }
}

function buildStats(data){
  const gain=data.filter(d=>+d['Pct Change']>0).length;
  const loss=data.filter(d=>+d['Pct Change']<0).length;
  const avgVR=(data.reduce((s,d)=>s+(+d['Volume Ratio']||0),0)/data.length).toFixed(2);
  const sects=new Set(data.map(d=>d['Sector']||'Other'));
  document.getElementById('cTotal').textContent=data.length;
  document.getElementById('cGain').textContent=gain;
  document.getElementById('cLoss').textContent=loss;
  document.getElementById('cAvg').textContent=avgVR+'x';
  document.getElementById('cSect').textContent=sects.size;
  // last updated from date column
  const dates=data.map(d=>d['Date']).filter(Boolean).sort();
  if(dates.length)document.getElementById('lastUp').innerHTML='Last data: <b>'+dates[dates.length-1]+'</b>';
}

function buildSectorTabs(data){
  const cnt={};
  data.forEach(d=>{const s=d['Sector']||'Other';cnt[s]=(cnt[s]||0)+1;});
  const sorted=Object.entries(cnt).sort((a,b)=>b[1]-a[1]);
  const tabs=document.getElementById('sectorTabs');
  tabs.innerHTML='';
  const all=document.createElement('button');
  all.className='s-tab'+(curSector==='All'?' active':'');
  all.textContent='All ('+data.length+')';
  all.onclick=()=>setSector('All');
  tabs.appendChild(all);
  sorted.forEach(([s,c])=>{
    const btn=document.createElement('button');
    btn.className='s-tab'+(curSector===s?' active':'');
    btn.textContent=s+' ('+c+')';
    btn.onclick=()=>setSector(s);
    tabs.appendChild(btn);
  });
}

function setSector(s){
  curSector=s;
  document.querySelectorAll('.s-tab').forEach(b=>{
    b.classList.toggle('active',b.textContent.startsWith(s==='All'?'All':s+' '));
  });
  curPage=1;
  applyFilters();
}

function applyFilters(){
  const srch=(document.getElementById('srch').value||'').toLowerCase();
  const minVR=+(document.getElementById('ratioFilt').value||0);
  const chgF=document.getElementById('chgFilt').value;
  filtData=allData.filter(d=>{
    if(curSector!=='All'&&(d['Sector']||'Other')!==curSector)return false;
    if(srch&&!(d['Symbol']||'').toLowerCase().includes(srch)&&!(d['Company Name']||'').toLowerCase().includes(srch))return false;
    if(minVR&&(+d['Volume Ratio']||0)<minVR)return false;
    if(chgF==='pos'&&(+d['Pct Change']||0)<=0)return false;
    if(chgF==='neg'&&(+d['Pct Change']||0)>=0)return false;
    return true;
  });
  // sort
  filtData.sort((a,b)=>{
    let av=a[sortCol],bv=b[sortCol];
    if(!isNaN(+av)&&!isNaN(+bv)){av=+av;bv=+bv;}
    if(av<bv)return sortDir;if(av>bv)return -sortDir;return 0;
  });
  document.getElementById('resInfo').textContent='Showing '+filtData.length+' stocks';
  renderPage();
}

function sortBy(col){
  if(sortCol===col)sortDir*=-1;else{sortCol=col;sortDir=-1;}
  document.querySelectorAll('thead th').forEach(th=>{
    th.classList.remove('sort-asc','sort-desc');
    if(th.dataset.col===col)th.classList.add(sortDir===1?'sort-asc':'sort-desc');
  });
  curPage=1;
  applyFilters();
}

function renderPage(){
  const start=(curPage-1)*perPage,end=Math.min(start+perPage,filtData.length);
  const slice=filtData.slice(start,end);
  const tbody=document.getElementById('tbody');
  tbody.innerHTML=slice.map((d,i)=>{
    const sym=(d['Symbol']||'').replace('.NS','').replace('.BO','');
    const link='https://finance.yahoo.com/quote/'+encodeURIComponent(d['Symbol']||'');
    const vr=+d['Volume Ratio']||0;
    return `<tr>
      <td class="rank">${start+i+1}</td>
      <td class="sym"><a href="${link}" target="_blank">${sym}</a></td>
      <td class="cname">${d['Company Name']||sym}</td>
      <td><span class="sect">${d['Sector']||'Other'}</span></td>
      <td>${fmtPct(d['Pct Change'])}</td>
      <td class="vr">${fmtVR(vr)}</td>
      <td>${fmt(d['Today Volume'])}</td>
      <td>${fmt(d['15D Avg Volume'])}</td>
      <td>${d['Date']||'—'}</td>
    </tr>`;
  }).join('');
  renderPagination();
}

function renderPagination(){
  const total=Math.ceil(filtData.length/perPage);
  const pag=document.getElementById('pagDiv');
  if(total<=1){pag.innerHTML='';return;}
  let html='';
  html+='<button onclick="goPage('+Math.max(1,curPage-1)+')" '+(curPage===1?'disabled':'')+'>&#8592; Prev</button>';
  const start=Math.max(1,curPage-2),end=Math.min(total,curPage+2);
  if(start>1)html+='<button onclick="goPage(1)">1</button>'+(start>2?'<span class="pi">...</span>':'');
  for(let p=start;p<=end;p++)html+='<button class="'+(p===curPage?'cur':'')+'" onclick="goPage('+p+')">'+p+'</button>';
  if(end<total)html+=(end<total-1?'<span class="pi">...</span>':'')+'<button onclick="goPage('+total+')">'+total+'</button>';
  html+='<button onclick="goPage('+Math.min(total,curPage+1)+')" '+(curPage===total?'disabled':'')+'> Next &#8594;</button>';
  html+='<span class="pi">Page '+curPage+' / '+total+'</span>';
  pag.innerHTML=html;
}

function goPage(p){curPage=p;renderPage();}
function resetFilters(){
  document.getElementById('srch').value='';
  document.getElementById('ratioFilt').value='0';
  document.getElementById('chgFilt').value='all';
  curSector='All';
  document.querySelectorAll('.s-tab').forEach(b=>b.classList.remove('active'));
  const allTab=document.querySelector('.s-tab');
  if(allTab)allTab.classList.add('active');
  curPage=1;
  applyFilters();
}

loadData();
</script>
</body>
</html>
