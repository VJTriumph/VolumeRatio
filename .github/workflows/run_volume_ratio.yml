name: Run Volume Ratio

on:
  workflow_dispatch:
  schedule:
    # Runs at 10:15 UTC (3:45 PM IST) Mon-Fri — 15 min after NSE market close
    - cron: '15 10 * * 1-5'

permissions:
  contents: write

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas

      - name: Run volume_ratio.py
        run: python volume_ratio.py

      - name: Commit output files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --cached --quiet || git commit -m "Auto-update: volume ratio output $(date +'%Y-%m-%d %H:%M IST')"
          git push
